name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    name: Web app checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nagarik-signal
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nagarik-signal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Seed demo read model
        run: npm run seed:demo

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
