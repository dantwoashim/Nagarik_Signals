name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    name: Web app checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nagarik-signal
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nagarik-signal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Seed sample read model
        run: npm run seed:demo

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install browser for experience checks
        run: npx playwright install --with-deps chromium

      - name: Browser experience checks
        run: npm run test:e2e
