name: Production Smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  verify:
    name: Verify stable production
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: nagarik-signal
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nagarik-signal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for and verify production
        env:
          NAGARIK_DEPLOYMENT_URL: https://nagarik-signal.vercel.app
          NAGARIK_EXPECTED_GIT_SHA: ${{ github.sha }}
          NAGARIK_DEPLOYMENT_WAIT_SECONDS: '480'
        run: npm run verify:deployment
